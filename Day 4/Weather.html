<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Now</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    .app {
      min-height: 100vh;
      padding: 2.5rem 1rem;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      transition: background 1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app.sunny     { background: linear-gradient(135deg, #f7971e, #ffd200, #f09432); }
    .app.cloudy    { background: linear-gradient(135deg, #485563, #29323c, #3e4c59); }
    .app.rainy     { background: linear-gradient(135deg, #1c3a5b, #2b6cb0, #1a365d); }
    .app.snowy     { background: linear-gradient(135deg, #a8c0d6, #cfdef3, #dce9f5); }
    .app.night     { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    .app.thunderstorm { background: linear-gradient(135deg, #200122, #6f0000, #3d0000); }

    .title {
      color: rgba(255,255,255,0.9);
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      animation: fadeDown 0.6s ease;
    }

    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1.2rem;
      animation: fadeDown 0.7s ease;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.9rem 3.8rem 0.9rem 1.4rem;
      border-radius: 50px;
      border: none;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
    .search-wrap input:focus {
      background: rgba(255,255,255,0.28);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
    }
    .search-wrap button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.22);
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s, transform 0.2s;
    }
    .search-wrap button:hover {
      background: rgba(255,255,255,0.4);
      transform: translateY(-50%) scale(1.08);
    }
    .search-wrap button svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .unit-toggle { display: flex; gap: 0.5rem; margin-bottom: 1.8rem; animation: fadeDown 0.8s ease; }
    .unit-btn {
      padding: 0.38rem 1rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .unit-btn.active { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.6); }

    .error-msg {
      color: #ffcdd2;
      background: rgba(211,47,47,0.3);
      border-radius: 14px;
      padding: 0.65rem 1.4rem;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      display: none;
      animation: shake 0.4s ease;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .error-msg.visible { display: block; }

    .loading { display: none; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.7); margin-bottom: 1.2rem; }
    .loading.visible { display: flex; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.65); animation: bounce 1.1s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      width: 100%;
      max-width: 480px;
      padding: 2rem 2rem;
      color: #fff;
      display: none;
    }
    .card.visible { display: block; animation: riseUp 0.5s cubic-bezier(0.23, 1, 0.32, 1); }

    .location-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; }
    .location-row svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.75; flex-shrink: 0; }
    .city-name { font-size: 1.6rem; font-weight: 600; }
    .country-date { font-size: 0.85rem; opacity: 0.65; margin-bottom: 1.5rem; }

    .main-weather { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 0.4rem; }
    .weather-icon { font-size: 5.5rem; line-height: 1; animation: floatIcon 4s ease-in-out infinite; }
    .temp-block .temp { font-size: 5rem; font-weight: 200; line-height: 1; letter-spacing: -0.02em; }
    .temp-block .feels { font-size: 0.85rem; opacity: 0.6; margin-top: 0.3rem; }

    .description { font-size: 1rem; opacity: 0.75; text-transform: capitalize; margin-bottom: 1.6rem; letter-spacing: 0.05em; }

    .divider { height: 1px; background: rgba(255,255,255,0.15); margin-bottom: 1.5rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 0.85rem 1rem;
      display: flex; flex-direction: column; gap: 0.3rem;
      transition: background 0.25s, transform 0.2s;
    }
    .stat-card:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .stat-label { font-size: 0.72rem; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.3rem; }
    .stat-label svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .stat-val { font-size: 1.15rem; font-weight: 500; }

    .sun-row { display: flex; gap: 0.8rem; }
    .sun-item { flex: 1; background: rgba(255,255,255,0.08); border-radius: 16px; padding: 0.8rem; text-align: center; transition: background 0.25s; }
    .sun-item:hover { background: rgba(255,255,255,0.16); }
    .sun-lbl { font-size: 0.72rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem; }
    .sun-time { font-size: 1.05rem; font-weight: 500; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes riseUp  { from { opacity: 0; transform: translateY(32px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1);opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

    @media(max-width:420px){
      .temp-block .temp { font-size: 3.8rem; }
      .weather-icon { font-size: 4rem; }
      .city-name { font-size: 1.3rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <p class="title">☁ Weather Now</p>

    <div class="search-wrap">
      <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off" />
      <button id="searchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <div class="unit-toggle">
      <button class="unit-btn active" id="btnC" onclick="setUnit('metric')">°C Celsius</button>
      <button class="unit-btn" id="btnF" onclick="setUnit('imperial')">°F Fahrenheit</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="loading" id="loading">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span style="font-size:0.85rem;margin-left:0.3rem;">Fetching weather...</span>
    </div>

    <div class="card" id="weatherCard">
      <div class="location-row">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span class="city-name" id="cityName"></span>
      </div>
      <div class="country-date" id="countryDate"></div>

      <div class="main-weather">
        <div class="weather-icon" id="weatherIcon"></div>
        <div class="temp-block">
          <div class="temp" id="tempVal"></div>
          <div class="feels" id="feelsLike"></div>
        </div>
      </div>
      <div class="description" id="weatherDesc"></div>

      <div class="divider"></div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/></svg>Humidity</div>
          <div class="stat-val" id="humidity"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><svg viewBox="0 0 24 24"><path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/></svg>Wind</div>
          <div class="stat-val" id="windSpeed"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Pressure</div>
          <div class="stat-val" id="pressure"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Visibility</div>
          <div class="stat-val" id="visibility"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Cloud Cover</div>
          <div class="stat-val" id="clouds"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>Min / Max</div>
          <div class="stat-val" id="minMax"></div>
        </div>
      </div>

      <div class="sun-row">
        <div class="sun-item">
          <div class="sun-lbl">🌅 Sunrise</div>
          <div class="sun-time" id="sunrise"></div>
        </div>
        <div class="sun-item">
          <div class="sun-lbl">🌇 Sunset</div>
          <div class="sun-time" id="sunset"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ Replace with your OpenWeatherMap API key from https://openweathermap.org/api
    const API_KEY = 'a5bf092ddfc6541e86de3bac18f48751';

    let unit = 'metric';

    const weatherEmojis = {
      'clear sky': '☀️', 'few clouds': '🌤️', 'scattered clouds': '⛅',
      'broken clouds': '🌥️', 'overcast clouds': '☁️', 'light rain': '🌦️',
      'moderate rain': '🌧️', 'heavy intensity rain': '🌧️', 'very heavy rain': '🌧️',
      'thunderstorm': '⛈️', 'light snow': '🌨️', 'snow': '❄️',
      'mist': '🌫️', 'fog': '🌫️', 'haze': '🌫️', 'drizzle': '🌦️',
      'shower rain': '🌧️', 'blizzard': '🌨️'
    };

    function getEmoji(desc) {
      const d = desc.toLowerCase();
      for (const [k, v] of Object.entries(weatherEmojis)) {
        if (d.includes(k)) return v;
      }
      return '🌡️';
    }

    function getBgClass(desc, isNight) {
      if (isNight) return 'night';
      const d = desc.toLowerCase();
      if (d.includes('thunder')) return 'thunderstorm';
      if (d.includes('snow') || d.includes('blizzard')) return 'snowy';
      if (d.includes('rain') || d.includes('drizzle')) return 'rainy';
      if (d.includes('cloud') || d.includes('mist') || d.includes('fog') || d.includes('haze')) return 'cloudy';
      if (d.includes('clear')) return 'sunny';
      return '';
    }

    function fmtTime(unix, tz) {
      const d = new Date((unix + tz) * 1000);
      const h = String(d.getUTCHours()).padStart(2, '0');
      const m = String(d.getUTCMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    function setUnit(u) {
      unit = u;
      document.getElementById('btnC').classList.toggle('active', u === 'metric');
      document.getElementById('btnF').classList.toggle('active', u === 'imperial');
      const city = document.getElementById('cityInput').value.trim();
      if (city) fetchWeather(city);
    }

    async function fetchWeather(city) {
      const loading  = document.getElementById('loading');
      const card     = document.getElementById('weatherCard');
      const errMsg   = document.getElementById('errorMsg');

      card.classList.remove('visible');
      errMsg.classList.remove('visible');
      loading.classList.add('visible');

      try {
        const res  = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=${unit}`
        );
        const data = await res.json();
        loading.classList.remove('visible');

        if (data.cod !== 200) {
          errMsg.textContent = data.message || 'City not found. Try a different spelling.';
          errMsg.classList.add('visible');
          return;
        }

        const desc    = data.weather[0].description;
        const now     = Math.floor(Date.now() / 1000);
        const isNight = now < data.sys.sunrise || now > data.sys.sunset;

        document.getElementById('app').className = 'app ' + getBgClass(desc, isNight);

        document.getElementById('cityName').textContent    = data.name;
        document.getElementById('countryDate').textContent =
          `${data.sys.country} · ${new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}`;

        document.getElementById('weatherIcon').textContent = getEmoji(desc);
        document.getElementById('tempVal').textContent     = `${Math.round(data.main.temp)}°${unit === 'metric' ? 'C' : 'F'}`;
        document.getElementById('feelsLike').textContent   = `Feels like ${Math.round(data.main.feels_like)}°`;
        document.getElementById('weatherDesc').textContent = desc;
        document.getElementById('humidity').textContent    = `${data.main.humidity}%`;

        const windSpeed = unit === 'metric'
          ? `${Math.round(data.wind.speed * 3.6)} km/h`
          : `${Math.round(data.wind.speed)} mph`;
        document.getElementById('windSpeed').textContent   = windSpeed;
        document.getElementById('pressure').textContent    = `${data.main.pressure} hPa`;
        document.getElementById('visibility').textContent  = `${(data.visibility / 1000).toFixed(1)} km`;
        document.getElementById('clouds').textContent      = `${data.clouds.all}%`;
        document.getElementById('minMax').textContent      = `${Math.round(data.main.temp_min)}° / ${Math.round(data.main.temp_max)}°`;
        document.getElementById('sunrise').textContent     = fmtTime(data.sys.sunrise, data.timezone);
        document.getElementById('sunset').textContent      = fmtTime(data.sys.sunset, data.timezone);

        card.classList.remove('visible');
        void card.offsetWidth;
        card.classList.add('visible');

      } catch (e) {
        loading.classList.remove('visible');
        errMsg.textContent = 'Network error. Check your API key or internet connection.';
        errMsg.classList.add('visible');
      }
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
      const city = document.getElementById('cityInput').value.trim();
      if (city) fetchWeather(city);
    });

    document.getElementById('cityInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const city = e.target.value.trim();
        if (city) fetchWeather(city);
      }
    });
  </script>
</body>
</html>
